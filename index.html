<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Riri's Kitchen Academy</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--p:#9B30FF;--c:#00D4FF;--y:#FFD700;--o:#FF7A00;--g:#00E87A;--pk:#FF4FCE;--bg:#FFF3E8;--text:#3A2010}
html,body{height:100%;overflow:hidden;background:#0A0310}
#app{font-family:'Nunito',sans-serif;height:100vh;width:100vw;position:relative;overflow:hidden;color:var(--text)}

/* SCREENS */
.screen{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
.screen.sR{animation:sInR .35s cubic-bezier(.25,.46,.45,.94) forwards}
.screen.sL{animation:sInL .35s cubic-bezier(.25,.46,.45,.94) forwards}
.screen.sU{animation:sInU .4s cubic-bezier(.34,1.2,.64,1) forwards}
@keyframes sInR{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes sInL{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes sInU{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}

/* KITCHEN CANVAS */
#kitchenCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%;opacity:0;transition:opacity 0.5s ease}

/* SPARKS */
.spark{position:fixed;pointer-events:none;z-index:999;border-radius:50%;animation:sparkFly .9s ease-out forwards}
@keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

/* SPLASH */
#welcome{background:#0A0310}
#splashBg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;z-index:0}
#splashRiri{position:absolute;bottom:0;left:50%;transform:translateX(-62%);height:95vh;width:auto;z-index:2;filter:drop-shadow(0 0 30px rgba(155,48,255,0.4));animation:rirFloat 4s ease-in-out infinite;transform-origin:bottom center}
@keyframes rirFloat{0%,100%{transform:translateX(-62%) translateY(0)}50%{transform:translateX(-62%) translateY(-14px)}}
#splashContent{position:absolute;bottom:7vh;left:50%;transform:translateX(-50%);width:50%;z-index:10;display:flex;flex-direction:column;align-items:center;text-align:center;gap:0.8rem;padding:0}
#splashLogo{position:absolute;top:auto;bottom:22vh;left:50%;transform:translateX(-50%);width:44%;max-width:480px;height:auto;z-index:3;animation:logoGlow 3s ease-in-out infinite}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 16px rgba(155,48,255,0.5))}50%{filter:drop-shadow(0 0 28px rgba(0,212,255,0.7))}}
#splashTag{font-family:'Nunito',sans-serif;font-size:clamp(.9rem,1.5vw,1.1rem);font-weight:700;color:rgba(255,255,255,0.95);text-shadow:0 2px 12px rgba(0,0,0,0.95)}
@media(max-width:600px){
  #splashBg{content:url(bg_mobile2.png)}
  #welcome{
    display:flex !important;
    flex-direction:column !important;
    align-items:center !important;
    justify-content:space-between !important;
    height:100vh !important;
    overflow:hidden !important;
    padding:0 0 2vh 0 !important;
  }
  #splashRiri{
    position:relative !important;
    bottom:auto !important;left:auto !important;
    transform:none !important;
    height:48vh !important;
    width:auto !important;
    flex-shrink:1 !important;
    animation:rirFloatM 4s ease-in-out infinite !important;
  }
  #splashLogo{
    position:relative !important;
    bottom:auto !important;left:auto !important;
    transform:none !important;
    width:85% !important;
    max-width:320px !important;
    flex-shrink:1 !important;
    margin:0 auto !important;
  }
  #splashContent{
    position:relative !important;
    bottom:auto !important;left:auto !important;
    transform:none !important;
    width:100% !important;
    padding:0 1.5rem !important;
    flex-shrink:0 !important;
    align-items:center !important;
    text-align:center !important;
    display:flex !important;
    flex-direction:column !important;
    gap:0.6rem !important;
  }
  #splashTag{font-size:0.8rem !important;color:white !important;text-shadow:0 2px 8px rgba(0,0,0,0.9) !important}
  .btn-start{font-size:1.2rem !important;padding:0.75rem 2rem !important}
}
@keyframes rirFloatM{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-8px)}
}
  50%{transform:translateY(-10px)}
}
@media(min-width:1400px){#splashRiri{height:92vh}#splashContent{width:46%}}

/* MENU */
#menu{z-index:1;overflow-y:auto;background:var(--bg)}
.menu-hdr{position:sticky;top:0;z-index:10;padding:.8rem 1rem .6rem;background:rgba(255,243,232,.95);backdrop-filter:blur(8px);display:flex;align-items:center;gap:.7rem;border-bottom:2px solid #FFD8C0}
.rchip{display:flex;align-items:center;gap:8px;background:white;border:2.5px solid #FFB0C8;border-radius:50px;padding:4px 11px 4px 4px;cursor:pointer;transition:all .2s;box-shadow:0 3px 12px rgba(255,100,150,.15)}
.chip-img{width:34px;height:34px;border-radius:50%;object-fit:cover;border:2px solid #FF6B9D}
.chip-name{font-family:'Boogaloo',cursive;font-size:1rem;color:#C05030}
.cwave{display:flex;align-items:center;gap:2px;height:12px;margin-left:2px}
.cb2{width:2px;border-radius:2px;background:linear-gradient(to top,#FF6B9D,#FF8C00);animation:wA .8s ease-in-out infinite}
.cb2:nth-child(1){height:3px}.cb2:nth-child(2){height:7px}.cb2:nth-child(3){height:10px}.cb2:nth-child(4){height:7px}.cb2:nth-child(5){height:3px}
.cwave.sil .cb2{animation:none;transform:scaleY(.2);opacity:.15}
.hud-gems{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#FFF8E0,#FFF0C0);border:2.5px solid #FFD030;border-radius:50px;padding:5px 13px;font-family:'Boogaloo',cursive;font-size:1.1rem;color:#CC8000;margin-left:auto}
.lvl-banner{margin:.7rem 1rem;background:white;border:2.5px solid #FFD8B0;border-radius:16px;padding:.65rem 1rem;display:flex;align-items:center;gap:.8rem}
.lvl-num{font-family:'Boogaloo',cursive;font-size:2rem;color:#FF6B00;line-height:1}
.lvl-info{flex:1}.lvl-lbl{font-size:.68rem;font-weight:900;letter-spacing:2px;color:#C09060;text-transform:uppercase}.lvl-name{font-family:'Boogaloo',cursive;font-size:1rem;color:#8B4020}
.xp-track{height:8px;background:#FFE8D0;border-radius:10px;overflow:hidden;margin-top:4px;border:1.5px solid #FFD0B0}
.xp-fill{height:100%;background:linear-gradient(90deg,#FF6B9D,#FF8C00,#FFD700);border-radius:10px;transition:width .6s}
.lvl-riri{width:46px;height:56px;object-fit:cover;object-position:top;border-radius:10px;border:2px solid #FFB0C8}
.sec-lbl{font-family:'Boogaloo',cursive;font-size:.82rem;letter-spacing:3px;color:#C4A070;text-transform:uppercase;margin:0 1rem .65rem}
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;padding:0 1rem 5rem}
.dcard{position:relative;border-radius:22px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;aspect-ratio:.85/1;box-shadow:0 6px 20px rgba(0,0,0,.12),0 0 0 3px rgba(255,255,255,.8)}
.dcard:active:not(.locked){transform:scale(.95)}
.dcard:hover:not(.locked){transform:translateY(-4px) scale(1.02)}
.dcard.locked{opacity:.45;cursor:not-allowed}
.dc-bg{position:absolute;inset:0}
.dc-bg.cake{background:linear-gradient(160deg,#FFD6E8,#FF8EC0 50%,#FF6BAA)}
.dc-bg.pizza{background:linear-gradient(160deg,#FFE8C0,#FFB84A 50%,#FF8C00)}
.dc-bg.soup{background:linear-gradient(160deg,#C8F0FF,#60D0FF 50%,#20B0F0)}
.dc-bg.smoothie{background:linear-gradient(160deg,#C8FFD8,#60E888 50%,#20C850)}
.dc-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.35) 0%,transparent 50%);pointer-events:none}
.dc-border{position:absolute;inset:0;border-radius:22px;border:3px solid rgba(255,255,255,.5);pointer-events:none}
.dc-orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-62%);width:80px;height:80px;border-radius:50%;background:rgba(255,255,255,.25);border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:2.6rem;animation:orbF 2.5s ease-in-out infinite}
@keyframes orbF{0%,100%{transform:translate(-50%,-62%)}50%{transform:translate(-50%,-70%)}}
.dc-info{position:absolute;bottom:0;left:0;right:0;padding:.65rem .75rem;background:linear-gradient(0deg,rgba(255,255,255,.85) 0%,transparent)}
.dc-name{font-family:'Boogaloo',cursive;font-size:1rem;color:#3A2010}
.dc-tag{display:inline-block;font-size:.6rem;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:2px 8px;border-radius:10px;margin-top:3px;background:rgba(255,255,255,.6);color:#5A3020;border:1.5px solid rgba(255,255,255,.8)}
.dc-stars{display:flex;gap:2px;margin-top:3px;font-size:.82rem}
.dc-new{position:absolute;top:9px;left:9px;background:linear-gradient(135deg,#FF6B9D,#FF8C00);border-radius:20px;padding:3px 9px;font-size:.6rem;font-weight:900;letter-spacing:1px;color:white;text-transform:uppercase}

/* GAME */
#game{z-index:2;overflow-y:auto;background:var(--bg)}
.game-hud{position:sticky;top:0;z-index:10;padding:.75rem 1rem;background:rgba(255,243,232,.95);backdrop-filter:blur(8px);display:flex;align-items:center;gap:.7rem;border-bottom:2px solid #FFD8C0}
.back-btn{width:38px;height:38px;border-radius:12px;background:white;border:2.5px solid #FFD8C0;color:#8B4020;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gdish{font-family:'Boogaloo',cursive;font-size:1.1rem;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#5A2010}
.prog-wrap{padding:.5rem 1rem}
.prog-labels{display:flex;justify-content:space-between;margin-bottom:4px}
.prog-lbl{font-size:.68rem;color:#C4A070;font-weight:900;letter-spacing:1px;text-transform:uppercase}
.prog-track{height:12px;background:#FFE8D0;border-radius:20px;overflow:hidden;border:2px solid #FFD0B0}
.prog-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,#FF6B9D,#FF8C00,#FFD700);transition:width .7s cubic-bezier(.34,1.2,.64,1)}
.gbody{padding:.5rem 1rem 3rem}
.riri-panel{display:flex;align-items:stretch;background:white;border:2.5px solid #FFB0C8;border-radius:20px;overflow:hidden;margin-bottom:.9rem;box-shadow:0 4px 16px rgba(255,100,150,.12);cursor:pointer}
.panel-canvas-wrap{width:78px;flex-shrink:0;background:linear-gradient(180deg,#FFF0F8,#FFE8F4);display:flex;align-items:flex-end;justify-content:center;overflow:hidden;border-right:2px solid #FFD8E8}
#panelCanvas{display:block}
.panel-r{flex:1;padding:.75rem .85rem;display:flex;flex-direction:column;justify-content:center}
.panel-nm{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.pname{font-family:'Boogaloo',cursive;font-size:.9rem;color:#C05030}
.pbadge{font-size:.58rem;background:linear-gradient(135deg,#FF6B9D,#FF8C00);border-radius:10px;padding:1px 7px;color:white;font-weight:900;letter-spacing:1px}
.ptext{font-size:.82rem;line-height:1.6;color:#5A3020}
.pwave{display:flex;align-items:center;gap:2px;height:12px;margin-top:4px}
.pb{width:2px;border-radius:2px;background:linear-gradient(to top,#FF6B9D,#FF8C00);animation:wA .8s ease-in-out infinite}
.pb:nth-child(1){height:3px}.pb:nth-child(2){height:7px}.pb:nth-child(3){height:10px}.pb:nth-child(4){height:7px}.pb:nth-child(5){height:3px}
.pwave.sil .pb{animation:none;transform:scaleY(.2);opacity:.15}
.phint{font-size:.62rem;color:#C4A070;margin-top:2px}
.chal-card{background:white;border-radius:24px;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.1);border:2.5px solid #FFE0C8;position:relative}
.chal-card::before{content:"";position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#FF6B9D,#FF8C00,#FFD700,#52C444,#4895EF)}
.chal-top{padding:.75rem 1rem;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid #FFE8D8}
.ctype{font-size:.67rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:20px;background:#FFF0E0;border:2px solid #FFD0A0;color:#CC6020}
.cnum{font-size:.73rem;color:#C4A070;font-weight:900}
.chal-body{padding:1rem 1.1rem .5rem;text-align:center}
.ingr-stage{width:90px;height:90px;border-radius:50%;margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;font-size:3.2rem;background:linear-gradient(135deg,#FFF8E0,#FFE8C0);border:3px solid #FFD080}
.ingr-inner{animation:iB 2s ease-in-out infinite}
@keyframes iB{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-8px) scale(1.05)}}
.chalq{font-family:'Boogaloo',cursive;font-size:1.25rem;line-height:1.4;color:#3A2010;margin-bottom:.9rem;min-height:2.8rem}
.ogrid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;padding:0 0 1rem}
.opt{position:relative;border:2.5px solid #FFD8C0;border-radius:16px;padding:.85rem .4rem;font-family:'Boogaloo',cursive;font-size:1.15rem;cursor:pointer;color:#3A2010;background:white;box-shadow:0 4px 0 #FFD0B0;transition:all .15s}
.opt:hover:not(:disabled){transform:translateY(-2px);border-color:#FF8C00}
.opt:active:not(:disabled){transform:translateY(3px)}
.opt:disabled{cursor:not-allowed}
.opt.correct{background:#E8FFE8;border-color:#52C444;color:#1A6010}
.opt.wrong{background:#FFE8E8;border-color:#FF4444;color:#8B0000}

/* CELEBRATION */
#celebration{z-index:3;align-items:center;justify-content:center;padding:1.5rem;background:var(--bg)}
.celeb-title{font-family:'Boogaloo',cursive;font-size:2.4rem;letter-spacing:2px;background:linear-gradient(135deg,#FF6B00,#FF3080,#9B30FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:titleP .6s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes titleP{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}
.celeb-sub{font-size:.9rem;color:#8B5030;max-width:290px;text-align:center;line-height:1.6;margin:.4rem 0 .7rem;background:rgba(255,255,255,.8);padding:.5rem 1rem;border-radius:12px;border:2px solid #FFD8C0}
.stars-row{display:flex;gap:.6rem;justify-content:center;margin:.5rem 0 1rem}
.star-pop{font-size:2.4rem;opacity:0;transform:scale(0) rotate(-30deg);animation:sPop .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes sPop{0%{opacity:0;transform:scale(0) rotate(-30deg)}100%{opacity:1;transform:scale(1) rotate(0)}}

/* BUTTONS */
.btn-start{background:linear-gradient(135deg,#FF6B9D,#FF8C00);color:white;border:none;border-radius:60px;padding:.9rem 3rem;font-family:'Boogaloo',cursive;font-size:1.5rem;letter-spacing:2px;cursor:pointer;box-shadow:0 5px 0 rgba(180,60,0,.3);transition:transform .1s,box-shadow .1s;text-transform:uppercase;position:relative;overflow:hidden}
.btn-start::after{content:"";position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:bGlint 2.5s ease-in-out infinite}
@keyframes bGlint{0%{left:-100%}40%{left:150%}100%{left:150%}}
.btn-start:active{transform:translateY(4px)}
.btn-sm{background:linear-gradient(135deg,#FF6B9D,#FF8C00);color:white;border:none;border-radius:50px;padding:.85rem 2.5rem;font-family:'Boogaloo',cursive;font-size:1.3rem;letter-spacing:2px;cursor:pointer;text-transform:uppercase;box-shadow:0 5px 0 rgba(180,60,0,.3);transition:transform .1s}
.btn-sm:active{transform:translateY(3px)}

/* VOICE FAB */
.vfab{position:fixed;bottom:1.2rem;right:1.2rem;z-index:50;width:46px;height:46px;border-radius:50%;background:white;border:2.5px solid #FFB0C8;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;box-shadow:0 4px 15px rgba(255,100,150,.2)}
.vfab.muted{opacity:.45}

/* LOADER */
.loader{position:fixed;inset:0;background:rgba(255,240,220,.92);z-index:200;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;backdrop-filter:blur(6px)}
.loader.hidden{display:none}
.lring{width:52px;height:52px;border-radius:50%;border:4px solid #FFD8C0;border-top-color:#FF6B9D;border-right-color:#FF8C00;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.llbl{font-family:'Boogaloo',cursive;font-size:1rem;color:#C05030;letter-spacing:1px}
.dots::after{content:"...";animation:dA 1.2s steps(3) infinite}
@keyframes dA{0%{content:"."}33%{content:".."}66%{content:"..."}100%{content:"."}}

/* WAVE BARS */
.vwave,.pwave,.cwave{display:flex;align-items:center;gap:2px}
.wb{width:3px;border-radius:2px;background:linear-gradient(to top,#FF6B9D,#FF8C00);animation:wA .8s ease-in-out infinite}
.wb:nth-child(1){height:4px;animation-delay:.0s}.wb:nth-child(2){height:10px;animation-delay:.1s}.wb:nth-child(3){height:15px;animation-delay:.2s}.wb:nth-child(4){height:10px;animation-delay:.3s}.wb:nth-child(5){height:4px;animation-delay:.4s}.wb:nth-child(6){height:12px;animation-delay:.15s}.wb:nth-child(7){height:15px;animation-delay:.25s}.wb:nth-child(8){height:7px;animation-delay:.35s}
@keyframes wA{0%,100%{transform:scaleY(.25);opacity:.3}50%{transform:scaleY(1);opacity:1}}
</style>
</head>
<body>
<canvas id="kitchenCanvas"></canvas>
<div id="app">
  <div class="loader hidden" id="loader"><div class="lring"></div><div class="llbl">Riri is cooking up your challenge<span class="dots"></span></div></div>
  <button class="vfab" id="vfab" onclick="toggleVoice()">🔊</button>

  <!-- WELCOME -->
  <div class="screen active" id="welcome">
    <img id="splashBg" src="" alt="">
    <img id="splashRiri" src="" alt="Riri">
    <canvas id="heroCanvas" width="1" height="1" style="position:absolute;opacity:0;pointer-events:none"></canvas>
    <img id="splashLogo" src="" alt="Riri's Kitchen">
    <div id="splashContent">
      <p id="splashTag">Cook. Learn. Level up with Riri! 👩🏾&#x200d;🍳✌️</p>
      <button class="btn-start" onclick="burst(event);goTo('menu','right')">LET'S COOK! 🍴</button>
    </div>
  </div>

  <!-- MENU -->
  <div class="screen" id="menu">
    <div class="menu-hdr">
      <div class="rchip" onclick="speakText('Hey Emma! Pick a dish and let\'s cook!')">
        <img class="chip-img" id="chipImg" src="" alt="Riri">
        <span class="chip-name">Riri</span>
        <div class="cwave sil" id="chipWave"><div class="cb2"></div><div class="cb2"></div><div class="cb2"></div><div class="cb2"></div><div class="cb2"></div></div>
      </div>
      <div class="hud-gems">⭐ <span id="totalStars">0</span></div>
    </div>
    <div class="lvl-banner">
      <div class="lvl-num" id="lvlNum">1</div>
      <div class="lvl-info"><div class="lvl-lbl">Level</div><div class="lvl-name" id="lvlName">Junior Chef</div><div class="xp-track"><div class="xp-fill" id="menuXP" style="width:0%"></div></div></div>
      <img class="lvl-riri" id="lvlImg" src="" alt="">
    </div>
    <div class="sec-lbl">🍽️ Choose your dish</div>
    <div class="dgrid" id="dgrid"></div>
  </div>

  <!-- GAME -->
  <div class="screen" id="game">
    <div class="game-hud">
      <button class="back-btn" onclick="stopSpeaking();goTo('menu','left')">←</button>
      <div class="gdish" id="gdish">🎂 Chocolate Cake</div>
      <div class="hud-gems" style="font-size:.88rem;padding:4px 11px">⭐ <span id="gstars">0</span></div>
    </div>
    <div class="prog-wrap">
      <div class="prog-labels"><div class="prog-lbl">Progress</div><div class="prog-lbl" id="progLbl">0 / 3</div></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
    </div>
    <div class="gbody">
      <div class="riri-panel" onclick="replayCoach()">
        <div class="panel-canvas-wrap"><canvas id="panelCanvas" width="78" height="110"></canvas></div>
        <div class="panel-r">
          <div class="panel-nm"><span class="pname">Riri</span><span class="pbadge">COACH</span></div>
          <div class="ptext" id="ptext">Getting your kitchen ready...</div>
          <div class="pwave sil" id="pwave"><div class="pb"></div><div class="pb"></div><div class="pb"></div><div class="pb"></div><div class="pb"></div></div>
          <div class="phint">Tap to hear Riri again 🔊</div>
        </div>
      </div>
      <div class="chal-card">
        <div class="chal-top"><div class="ctype" id="ctype">CHALLENGE</div><div class="cnum" id="cnum">1 / 3</div></div>
        <div class="chal-body">
          <div class="ingr-stage"><div class="ingr-inner" id="ingr">🥚</div></div>
          <div class="chalq" id="chalq">Loading...</div>
        </div>
        <div class="ogrid" id="ogrid"></div>
      </div>
    </div>
  </div>

  <!-- CELEBRATION -->
  <div class="screen" id="celebration">
    <canvas id="celebCanvas" width="200" height="260"></canvas>
    <div class="celeb-title">You Did It! ✌️</div>
    <div class="stars-row" id="starsRow"></div>
    <div class="celeb-sub" id="celebSub">Amazing cooking Emma!</div>
    <button class="btn-sm" onclick="burst(event);goTo('menu','left')">COOK AGAIN! 🍴</button>
  </div>
</div>
<script>

// ══ KITCHEN BACKGROUND ══
(function(){
  const cv=document.getElementById('kitchenCanvas');
  if(!cv)return;
  const ctx=cv.getContext('2d');
  let W,H,T=0;
  function rsz(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  rsz();window.addEventListener('resize',rsz);

  function ol(c,w){ctx.strokeStyle=c;ctx.lineWidth=w||3;ctx.lineJoin='round';ctx.lineCap='round';}

  function drawKitchen(){
    ctx.clearRect(0,0,W,H);
    // wall
    ctx.fillStyle='#FFF3E8';ctx.fillRect(0,0,W,H);
    // tiles
    const s=Math.round(W/9);
    for(let x=0;x<W;x+=s)for(let y=0;y<H*0.62;y+=s){
      ctx.fillStyle=(Math.floor(x/s)+Math.floor(y/s))%2===0?'#FFDDD0':'#FFF8F4';
      ctx.fillRect(x,y,s,s);
    }
    ctx.strokeStyle='#EDD0C4';ctx.lineWidth=0.8;
    for(let x=0;x<=W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H*0.62);ctx.stroke();}
    for(let y=0;y<=H*0.62;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // floor
    const baseY=H*0.638;
    for(let x=0;x<W;x+=s)for(let y=baseY;y<H;y+=s){
      ctx.fillStyle=(Math.floor(x/s)+Math.floor((y-baseY)/s))%2===0?'#EEE4D0':'#E2D8C4';
      ctx.fillRect(x,y,s,s);
    }
    ctx.strokeStyle='#D4C8B0';ctx.lineWidth=0.6;
    for(let x=0;x<=W;x+=s){ctx.beginPath();ctx.moveTo(x,baseY);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=baseY;y<=H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    // floor shine
    const fg=ctx.createLinearGradient(0,baseY,0,baseY+60);fg.addColorStop(0,'rgba(255,255,255,0.18)');fg.addColorStop(1,'transparent');
    ctx.fillStyle=fg;ctx.fillRect(0,baseY,W,60);
    // counter
    const ctY=H*0.598;
    ctx.fillStyle='#F0B870';ctx.fillRect(0,ctY,W,40);
    ctx.fillStyle='#FAD090';ctx.fillRect(0,ctY,W,7);
    ctx.fillStyle='#CC8840';ctx.fillRect(0,ctY+37,W,5);
    ol('#C07830',2.5);ctx.beginPath();ctx.moveTo(0,ctY);ctx.lineTo(W,ctY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,ctY+40);ctx.lineTo(W,ctY+40);ctx.stroke();
    // window (centred)
    drawWindow(W/2,H);
    // cabinets
    drawCabinets(W,H,ctY);
    // steam before items
    drawSteam(W,H,ctY,T);
    // cooker
    drawCooker(W,H,ctY,T);
    // kettle left
    drawKettle(W,H,ctY,T);
    // fruit bowl right
    drawFruitBowl(W,H,ctY);
    // cake tin
    drawCakeTin(W,H,ctY);
    // lights
    drawLights(W,H,T);
    T++;
  }

  function drawWindow(cx,H){
    const wy=Math.round(H*0.03),ww=Math.round(W*0.33),wh=Math.round(H*0.2);
    const wx=cx-ww/2;
    // curtain rod
    ctx.fillStyle='#C8A060';ctx.beginPath();ctx.roundRect(wx-20,wy-7,ww+40,8,4);ctx.fill();ol('#A07840',2.5);ctx.stroke();
    [wx-20,wx+ww+12].forEach(bx=>{ctx.fillStyle='#C8A060';ctx.beginPath();ctx.arc(bx+4,wy-3,6,0,Math.PI*2);ctx.fill();ol('#A07840',2);ctx.stroke();});
    // curtains
    [[wx-20,wx+10],[wx+ww+20,wx+ww-10]].forEach(([from,to],i)=>{
      ctx.fillStyle='#FFB0C8';ctx.beginPath();ctx.moveTo(from,wy-7);
      if(i===0){ctx.lineTo(to,wy+10);ctx.lineTo(to,wy+wh+12);ctx.quadraticCurveTo(from-4,wy+wh+18,from-4,wy+wh+8);}
      else{ctx.lineTo(to,wy+10);ctx.lineTo(to,wy+wh+12);ctx.quadraticCurveTo(from+4,wy+wh+18,from+4,wy+wh+8);}
      ctx.closePath();ctx.fill();ol('#FF88A8',2.5);ctx.stroke();
    });
    // sky
    ctx.fillStyle='#74D6F4';ctx.beginPath();ctx.roundRect(wx,wy,ww,wh,6);ctx.fill();ol('#50B8D8',3);ctx.stroke();
    // sun
    const p=0.95+Math.sin(T*0.02)*0.05;
    ctx.strokeStyle='rgba(255,210,0,0.45)';ctx.lineWidth=2;
    for(let r=0;r<8;r++){const a=r*Math.PI/4+T*0.01;ctx.beginPath();ctx.moveTo(wx+ww-24+Math.cos(a)*15*p,wy+22+Math.sin(a)*15*p);ctx.lineTo(wx+ww-24+Math.cos(a)*22*p,wy+22+Math.sin(a)*22*p);ctx.stroke();}
    ctx.fillStyle='#FFD60A';ctx.beginPath();ctx.arc(wx+ww-24,wy+22,13*p,0,Math.PI*2);ctx.fill();ol('#FFA000',2.5);ctx.stroke();
    ctx.fillStyle='#D47000';[[-4,-3],[4,-3]].forEach(([dx,dy])=>{ctx.beginPath();ctx.arc(wx+ww-24+dx,wy+22+dy,2.5,0,Math.PI*2);ctx.fill();});
    ctx.strokeStyle='#D47000';ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.arc(wx+ww-24,wy+27,5,0.2,Math.PI-0.2);ctx.stroke();
    // cloud
    ctx.fillStyle='white';[[wx+18,wy+28,9],[wx+30,wy+22,12],[wx+44,wy+27,9]].forEach(([cx2,cy,cr])=>{ctx.beginPath();ctx.arc(cx2,cy,cr,0,Math.PI*2);ctx.fill();});
    // grass
    ctx.fillStyle='#6CC84A';ctx.beginPath();ctx.roundRect(wx,wy+wh-16,ww,16,{lowerLeft:6,lowerRight:6});ctx.fill();ol('#4AA030',2.5);ctx.stroke();
    // flowers
    [[wx+14,wy+wh-9,'#FF6B9D'],[wx+34,wy+wh-11,'#FFB703'],[wx+56,wy+wh-8,'#4895EF']].forEach(([fx,fy,fc])=>{
      ctx.fillStyle=fc;[[-4,0],[4,0],[0,-4],[0,4]].forEach(([px,py])=>{ctx.beginPath();ctx.ellipse(fx+px,fy+py,4,3,0,0,Math.PI*2);ctx.fill();});
      ctx.fillStyle='#FFE030';ctx.beginPath();ctx.arc(fx,fy,3.5,0,Math.PI*2);ctx.fill();
    });
    // window frame
    ctx.fillStyle='white';
    [[wx-4,wy-4,ww+8,7],[wx-4,wy+wh-2,ww+8,7],[wx-4,wy-4,7,wh+8],[wx+ww-2,wy-4,7,wh+8]].forEach(([rx,ry,rw,rh])=>{ctx.beginPath();ctx.roundRect(rx,ry,rw,rh,3);ctx.fill();});
    ol('#D4C8B8',2.5);ctx.beginPath();ctx.roundRect(wx-3,wy-3,ww+6,wh+6,4);ctx.stroke();
    ctx.fillStyle='white';ctx.beginPath();ctx.roundRect(wx+ww/2-3,wy,5,wh,2);ctx.fill();ctx.beginPath();ctx.roundRect(wx,wy+wh/2-3,ww,5,2);ctx.fill();
    // sill
    ctx.fillStyle='#FFF8F0';ctx.beginPath();ctx.roundRect(wx-8,wy+wh+1,ww+16,12,5);ctx.fill();ol('#DDD0C0',2.5);ctx.stroke();
    // pot plant
    const ppx=wx+8,ppy=wy+wh;
    ctx.fillStyle='#E84855';ctx.beginPath();ctx.roundRect(ppx,ppy,16,13,{lowerLeft:4,lowerRight:4,upperLeft:2,upperRight:2});ctx.fill();ol('#C03040',2);ctx.stroke();
    ctx.fillStyle='#5CC444';ctx.beginPath();ctx.arc(ppx+8,ppy-4,7,0,Math.PI*2);ctx.fill();ol('#3A9A2A',2);ctx.stroke();
  }

  function drawCabinets(W,H,ctY){
    const gap=Math.round(W*0.04);
    const cw=Math.round(W*0.24),ch=Math.round(H*0.18);
    const cy=H*0.265;
    const positions=[gap, W/2-cw/2, W-cw-gap];
    positions.forEach(cx=>{
      ctx.fillStyle='rgba(0,0,0,0.05)';ctx.beginPath();ctx.roundRect(cx+3,cy+3,cw,ch,10);ctx.fill();
      ctx.fillStyle='#FFF8EE';ctx.beginPath();ctx.roundRect(cx,cy,cw,ch,10);ctx.fill();ol('#D8C8A8',3);ctx.stroke();
      ctx.fillStyle='#FFF3E4';ctx.beginPath();ctx.roundRect(cx+8,cy+8,cw-16,ch-16,7);ctx.fill();ol('#E4D4B4',2);ctx.stroke();
      ctx.fillStyle='#EEC030';ctx.beginPath();ctx.roundRect(cx+cw/2-14,cy+ch/2-4,28,8,5);ctx.fill();ol('#C09010',2.5);ctx.stroke();
      [cy+14,cy+ch-14].forEach(hy=>{ctx.fillStyle='#D4A820';ctx.beginPath();ctx.roundRect(cx+6,hy-5,10,10,3);ctx.fill();ol('#B08810',1.5);ctx.stroke();});
    });
    // lower cabinets
    const baseY=ctY+40;const fH=H-baseY;
    ctx.fillStyle='#F5EEE0';ctx.fillRect(0,baseY,W,fH);
    positions.forEach(cx=>{
      ctx.fillStyle='rgba(0,0,0,0.05)';ctx.beginPath();ctx.roundRect(cx+3,baseY+4+3,cw,fH-8,10);ctx.fill();
      ctx.fillStyle='#FFF8EE';ctx.beginPath();ctx.roundRect(cx,baseY+4,cw,fH-8,10);ctx.fill();ol('#D8C8A8',3);ctx.stroke();
      ctx.fillStyle='#FFF3E4';ctx.beginPath();ctx.roundRect(cx+8,baseY+12,cw-16,fH-24,7);ctx.fill();ol('#E4D4B4',2);ctx.stroke();
      ctx.fillStyle='#EEC030';ctx.beginPath();ctx.roundRect(cx+cw/2-14,baseY+(fH/2)-4,28,8,5);ctx.fill();ol('#C09010',2.5);ctx.stroke();
      [baseY+16,baseY+fH-16].forEach(hy=>{ctx.fillStyle='#D4A820';ctx.beginPath();ctx.roundRect(cx+6,hy-5,10,10,3);ctx.fill();ol('#B08810',1.5);ctx.stroke();});
    });
    ctx.fillStyle='#E4D8C4';ctx.fillRect(0,H-10,W,10);
  }

  function drawSteam(W,H,ctY,T){
    const sx=W/2-Math.round(W*0.18);
    const potCX=sx+Math.round(W*0.08);
    const potTopY=ctY-Math.round(H*0.21);
    [-4,4].forEach((xoff,col)=>{
      for(let i=0;i<4;i++){
        const phase=(T*0.7+i*12+col*20)%48;
        const prog=phase/48;
        const alpha=prog<0.25?prog/0.25*0.28:(1-prog)*0.28;
        if(alpha<0.01)return;
        const px=potCX+xoff+Math.sin(prog*Math.PI*2+col)*4;
        const py=potTopY-prog*28;
        ctx.fillStyle=`rgba(200,215,235,${alpha})`;
        ctx.beginPath();ctx.arc(px,py,3+prog*5,0,Math.PI*2);ctx.fill();
      }
    });
  }

  function drawCooker(W,H,ctY,T){
    const sw=Math.round(W*0.36),sh=Math.round(H*0.17);
    const sx=W/2-sw/2,sy=ctY-sh;
    ctx.fillStyle='#FAFAF5';ctx.beginPath();ctx.roundRect(sx,sy,sw,sh,8);ctx.fill();ol('#CCCCC0',3.5);ctx.stroke();
    // tiles behind
    for(let tx=sx;tx<sx+sw;tx+=18){
      ctx.fillStyle=Math.floor((tx-sx)/18)%2===0?'#FFE8D6':'#FFFFFF';
      ctx.fillRect(tx,sy-18,18,18);ctx.strokeStyle='#DDD0C4';ctx.lineWidth=0.5;ctx.beginPath();ctx.rect(tx,sy-18,18,18);ctx.stroke();
    }
    const hr=Math.round(sw*0.12);
    const hobs=[[sx+sw*0.22,sy+sh*0.29],[sx+sw*0.55,sy+sh*0.29],[sx+sw*0.22,sy+sh*0.67],[sx+sw*0.55,sy+sh*0.67]];
    hobs.forEach(([hx,hy],i)=>{
      const on=i<2;
      ctx.fillStyle=on?'#FF5030':'#C0B0A0';ctx.beginPath();ctx.arc(hx,hy,hr,0,Math.PI*2);ctx.fill();ol(on?'#CC3010':'#A09080',2.5);ctx.stroke();
      ctx.fillStyle=on?'#FF7050':'#D4C4B4';ctx.beginPath();ctx.arc(hx,hy,hr*0.58,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=on?'#FFAA80':'#E4D4C4';ctx.beginPath();ctx.arc(hx,hy,hr*0.26,0,Math.PI*2);ctx.fill();
      if(on){const p=0.5+Math.sin(T*0.06+i)*0.15;const g=ctx.createRadialGradient(hx,hy,0,hx,hy,hr*1.4);g.addColorStop(0,`rgba(255,120,40,${0.3*p})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.beginPath();ctx.arc(hx,hy,hr*1.4,0,Math.PI*2);ctx.fill();}
    });
    // knob panel
    ctx.fillStyle='#F0EAE0';ctx.beginPath();ctx.roundRect(sx+6,sy+sh-16,sw-12,13,6);ctx.fill();ol('#C8B89A',2);ctx.stroke();
    for(let k=0;k<5;k++){const kx=sx+sw*0.1+k*(sw*0.2);ctx.fillStyle=k<2?'#FF6644':'#D8C8B0';ctx.beginPath();ctx.arc(kx,sy+sh-9,5,0,Math.PI*2);ctx.fill();ol('#AA8860',1.5);ctx.stroke();}
    // pot on left hob
    drawPot(hobs[0][0],sy-sh*0.45,sw);
    // pan on right hob
    drawPan(hobs[1][0],sy-sh*0.35,sw);
  }

  function drawPot(cx,topY,sw){
    const w=Math.round(sw*0.14),h=Math.round(sw*0.11);
    const x=cx-w/2;
    ctx.fillStyle='#E84855';ctx.beginPath();ctx.moveTo(x+4,topY);ctx.lineTo(x+w-4,topY);ctx.quadraticCurveTo(x+w+4,topY,x+w+2,topY+10);ctx.lineTo(x+w,topY+h);ctx.quadraticCurveTo(x+w/2,topY+h+8,x,topY+h);ctx.lineTo(x-2,topY+10);ctx.quadraticCurveTo(x-4,topY,x+4,topY);ctx.closePath();ctx.fill();ol('#C03040',3);ctx.stroke();
    ctx.fillStyle='#FF8899';ctx.beginPath();ctx.ellipse(cx,topY,w/2+3,8,0,0,Math.PI*2);ctx.fill();ol('#C03040',3);ctx.stroke();
    ctx.fillStyle='#CC2030';ctx.beginPath();ctx.arc(cx,topY-5,5,0,Math.PI*2);ctx.fill();ol('#AA1020',2);ctx.stroke();
    ctx.fillStyle='#C49A5A';ctx.beginPath();ctx.roundRect(x-12,topY+h*0.4,12,9,4);ctx.fill();ol('#A07830',2);ctx.stroke();ctx.beginPath();ctx.roundRect(x+w,topY+h*0.4,12,9,4);ctx.fill();ol('#A07830',2);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(cx-8,topY+8,4,8,-.2,0,Math.PI*2);ctx.fill();
  }

  function drawPan(cx,topY,sw){
    const pw=Math.round(sw*0.145),ph=13;
    ctx.fillStyle='#FFB703';ctx.beginPath();ctx.ellipse(cx,topY+ph/2,pw/2,ph/2+3,0,0,Math.PI*2);ctx.fill();ol('#CC8800',3);ctx.stroke();
    ctx.fillStyle='#FFD050';ctx.beginPath();ctx.ellipse(cx,topY,pw/2+2,6,0,0,Math.PI*2);ctx.fill();ol('#CC8800',2.5);ctx.stroke();
    ctx.fillStyle='#8B5E20';ctx.beginPath();ctx.roundRect(cx+pw/2+2,topY-2,Math.round(sw*0.11),11,5);ctx.fill();ol('#6B3E10',2.5);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.beginPath();ctx.ellipse(cx-3,topY+ph/2-1,10,7,0,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(cx+4,topY+ph/2,8,6,0.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFD700';ctx.beginPath();ctx.arc(cx,topY+ph/2,5,0,Math.PI*2);ctx.fill();ol('#FFA500',1.5);ctx.stroke();
  }

  function drawKettle(W,H,ctY,T){
    const r=Math.round(W*0.075);
    const kx=Math.round(W*0.1),ky=ctY-r*2.8;
    ctx.fillStyle='#4895EF';ctx.beginPath();ctx.arc(kx,ky+r,r,0,Math.PI*2);ctx.fill();ol('#2060C0',3.5);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.28)';ctx.beginPath();ctx.ellipse(kx-r*0.4,ky+r*0.55,r*0.28,r*0.45,-.4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#4895EF';ctx.beginPath();ctx.moveTo(kx+r*0.85,ky+r*0.55);ctx.quadraticCurveTo(kx+r*1.6,ky+r*0.22,kx+r*1.65,ky+r*0.5);ctx.quadraticCurveTo(kx+r*1.6,ky+r*0.78,kx+r*0.85,ky+r*0.88);ctx.closePath();ctx.fill();ol('#2060C0',3);ctx.stroke();
    ctx.strokeStyle='#2060C0';ctx.lineWidth=8;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(kx-r*0.72,ky+r*0.4);ctx.quadraticCurveTo(kx-r*1.4,ky+r,kx-r*0.72,ky+r*1.6);ctx.stroke();
    ctx.strokeStyle='#5AAAF8';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(kx-r*0.72,ky+r*0.4);ctx.quadraticCurveTo(kx-r*1.4,ky+r,kx-r*0.72,ky+r*1.6);ctx.stroke();
    ctx.fillStyle='#2060C0';ctx.beginPath();ctx.ellipse(kx,ky+r*0.14,r*0.45,r*0.18,0,0,Math.PI*2);ctx.fill();ol('#1040A0',2);ctx.stroke();
    ctx.fillStyle='#5AAAF8';ctx.beginPath();ctx.arc(kx,ky+r*0.07,r*0.14,0,Math.PI*2);ctx.fill();ol('#2060C0',2);ctx.stroke();
    ctx.fillStyle='#2060C0';ctx.beginPath();ctx.roundRect(kx-r*0.55,ky+r*1.9,r*1.1,r*0.2,3);ctx.fill();ol('#1040A0',1.5);ctx.stroke();
    // kettle steam
    for(let i=0;i<2;i++){const ph=(T*0.6+i*16)%32;const pr=ph/32;const al=pr<0.3?pr/0.3*0.25:(1-pr)*0.25;if(al<0.01)continue;ctx.fillStyle=`rgba(200,215,235,${al})`;ctx.beginPath();ctx.arc(kx+r*1.65+pr*10,ky+r*0.35-pr*14,2.5+pr*3.5,0,Math.PI*2);ctx.fill();}
  }

  function drawFruitBowl(W,H,ctY){
    const bw=Math.round(W*0.2);
    const bx=W-Math.round(W*0.1)-bw/2,by=ctY-Math.round(H*0.12);
    ctx.fillStyle='rgba(0,0,0,0.06)';ctx.beginPath();ctx.ellipse(bx,ctY-6,bw/2+4,6,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFFAF0';ctx.beginPath();ctx.moveTo(bx-bw/2,by+bw*0.26);ctx.quadraticCurveTo(bx-bw/2-4,by+bw*0.54,bx,by+bw*0.56);ctx.quadraticCurveTo(bx+bw/2+4,by+bw*0.54,bx+bw/2,by+bw*0.26);ctx.closePath();ctx.fill();ol('#D8C8A0',3.5);ctx.stroke();
    ctx.fillStyle='#FFF8E8';ctx.beginPath();ctx.ellipse(bx,by+bw*0.26,bw/2,bw*0.08,0,0,Math.PI*2);ctx.fill();ol('#D8C8A0',3);ctx.stroke();
    const fr=Math.round(bw*0.12);
    ctx.fillStyle='#E84855';ctx.beginPath();ctx.arc(bx-bw*0.2,by+bw*0.18,fr,0,Math.PI*2);ctx.fill();ol('#C03040',2.5);ctx.stroke();
    ctx.strokeStyle='#3A8A20';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(bx-bw*0.2,by+bw*0.06);ctx.lineTo(bx-bw*0.2,by+bw*0.02);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.arc(bx-bw*0.25,by+bw*0.12,fr*0.35,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FF8C00';ctx.beginPath();ctx.arc(bx+bw*0.12,by+bw*0.15,fr*0.92,0,Math.PI*2);ctx.fill();ol('#CC6600',2.5);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.25)';ctx.beginPath();ctx.arc(bx+bw*0.07,by+bw*0.09,fr*0.32,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#FFD60A';ctx.lineWidth=Math.round(bw*0.09);ctx.lineCap='round';ctx.beginPath();ctx.moveTo(bx-bw*0.24,by+bw*0.31);ctx.quadraticCurveTo(bx-bw*0.02,by+bw*0.1,bx+bw*0.28,by+bw*0.28);ctx.stroke();
    ol('#CC9900',2);ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(bx-bw*0.24,by+bw*0.31);ctx.quadraticCurveTo(bx-bw*0.02,by+bw*0.1,bx+bw*0.28,by+bw*0.28);ctx.stroke();
  }

  function drawCakeTin(W,H,ctY){
    const tw=Math.round(W*0.09),th=Math.round(H*0.1);
    const tx=W/2+Math.round(W*0.2),ty=ctY-th-8;
    ctx.fillStyle='#A8D8FF';ctx.beginPath();ctx.roundRect(tx,ty+8,tw,th,4);ctx.fill();ol('#5090C0',3);ctx.stroke();
    ctx.fillStyle='#C4E8FF';ctx.beginPath();ctx.roundRect(tx-3,ty+5,tw+6,8,4);ctx.fill();ol('#5090C0',3);ctx.stroke();

  c.strokeStyle="rgba(100,45,15,0.35)";c.lineWidth=1.5;c.lineCap="round";c.beginPath();c.arc(-mw-1,my-1,3,0.3,1.8);c.stroke();c.beginPath();c.arc(mw+1,my-1,3,Math.PI+0.3,Math.PI+1.8);c.stroke();
}
function rHairTop(c){c.fillStyle=RC.hair;c.beginPath();c.ellipse(0,-20,38,24,0,Math.PI,Math.PI*2);c.fill();for(let i=0;i<6;i++){const ry=-42+i*6;if(ry>-16)break;c.strokeStyle="rgba(20,8,38,0.9)";c.lineWidth=2.8;c.beginPath();c.moveTo(-34+i*1.5,ry);c.quadraticCurveTo(0,ry-3,34-i*1.5,ry);c.stroke();}c.strokeStyle=RC.hairD;c.lineWidth=3;c.beginPath();c.arc(0,-20,38,Math.PI+0.3,Math.PI*2-0.3);c.stroke();}
function rBraidsFront(c,t){const wt=Date.now()*0.0004;[{sx:-32,sy:-18,cpx:-42,cpy:10,ex:-44,ey:55,w:4.5,d:0.1},{sx:32,sy:-18,cpx:42,cpy:10,ex:44,ey:55,w:4.5,d:0.5}].forEach(b=>{const sw=Math.sin(wt+b.d)*3;c.strokeStyle=RC.hairD;c.lineWidth=b.w;c.beginPath();c.moveTo(b.sx,b.sy);c.bezierCurveTo(b.cpx+sw,b.cpy,b.cpx+sw,b.cpy+20,b.ex+sw,b.ey);c.stroke();c.strokeStyle="rgba(55,20,90,0.5)";c.lineWidth=b.w*0.4;c.beginPath();c.moveTo(b.sx,b.sy);c.bezierCurveTo(b.cpx+sw+1.5,b.cpy,b.cpx+sw+1.5,b.cpy+20,b.ex+sw+1.5,b.ey);c.stroke();});}
function rClips(c){c.fillStyle="#1E1E3C";c.beginPath();c.roundRect(8,-46,24,15,4);c.fill();c.strokeStyle=RC.jktP;c.lineWidth=1;c.beginPath();c.roundRect(8,-46,24,15,4);c.stroke();c.fillStyle=RC.jc;c.shadowColor=RC.jc;c.shadowBlur=8;c.beginPath();c.roundRect(11,-43,9,9,2);c.fill();c.fillStyle=RC.jp;c.beginPath();c.roundRect(22,-43,7,9,2);c.fill();c.shadowBlur=0;c.fillStyle="#1E1E3C";c.beginPath();c.roundRect(-32,-38,16,10,3);c.fill();c.fillStyle=RC.jpk;c.shadowColor=RC.jpk;c.shadowBlur=5;c.beginPath();c.roundRect(-30,-36,12,6,2);c.fill();c.shadowBlur=0;}
function rAura(c,x,y){for(let i=0;i<3;i++){const r=50+i*22+Math.sin(Date.now()*0.003+i)*8,a=0.15-i*0.04;c.strokeStyle=`rgba(180,80,255,${a})`;c.lineWidth=2;c.beginPath();c.arc(0,-80,r,0,Math.PI*2);c.stroke();}}

// ══ VOICE ══
let voiceOn=true,lastCoach="",selVoice=null;
function getVoice(){if(selVoice)return selVoice;const vs=window.speechSynthesis.getVoices();const fh=["samantha","karen","moira","tessa","victoria","allison","zira","hazel","fiona","kate","aria","ava","emily","jessica","amy","emma","sarah","google uk english female","google us english"];for(const h of fh){const m=vs.find(v=>v.name.toLowerCase().includes(h));if(m)return m;}return vs.find(v=>v.lang.startsWith("en"))||vs[0]||null;}
function speakText(txt,cb){if(!voiceOn||!txt)return;window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.rate=0.88;u.pitch=1.15;u.volume=1;const v=getVoice();if(v)u.voice=v;u.onstart=()=>setWaves(true);u.onend=()=>{setWaves(false);if(cb)cb();};u.onerror=()=>setWaves(false);window.speechSynthesis.speak(u);}
function stopSpeaking(){window.speechSynthesis.cancel();setWaves(false);}
function setWaves(on){["wWave","chipWave","pwave"].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle("sil",!on);});rState=on?"talk":rState==="talk"?"idle":rState;}
function toggleVoice(){voiceOn=!voiceOn;const b=document.getElementById("vfab");b.textContent=voiceOn?"🔊":"🔇";b.classList.toggle("muted",!voiceOn);if(voiceOn)speakText("Voice is back on!");else stopSpeaking();}
function replayCoach(){if(lastCoach)speakText(lastCoach);}
function setCoach(txt){lastCoach=txt;const el=document.getElementById("ptext");if(el)el.textContent=txt;speakText(txt);}
window.speechSynthesis.onvoiceschanged=()=>{};


// ══ APP STATE ══
const LEVELS=[{min:0,name:"Junior Chef",xpNext:5},{min:5,name:"Kitchen Star",xpNext:12},{min:12,name:"Master Chef",xpNext:25},{min:25,name:"Riri's Apprentice",xpNext:999}];
const DISHES=[
  {id:"cake",name:"Chocolate Cake",emoji:"🎂",subject:"Maths",locked:false,stars:0,cls:"cake",isNew:true},
  {id:"pizza",name:"Yummy Pizza",emoji:"🍕",subject:"Spelling",locked:false,stars:0,cls:"pizza",isNew:true},
  {id:"soup",name:"Rainbow Soup",emoji:"🍲",subject:"Colours",locked:false,stars:0,cls:"soup",isNew:false},
  {id:"smoothie",name:"Super Smoothie",emoji:"🥤",subject:"Counting",locked:false,stars:0,cls:"smoothie",isNew:false},
];
let totalStars=0,curDish=null,challenges=[],curIdx=0,correct=0;

function getLevel(){for(let i=LEVELS.length-1;i>=0;i--){if(totalStars>=LEVELS[i].min)return{...LEVELS[i],idx:i}}return{...LEVELS[0],idx:0};}

function goTo(id,dir){
  stopSpeaking();
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active","sR","sL","sU"));
  const next=document.getElementById(id);next.classList.add("active");
  if(dir==="right")next.classList.add("sR");else if(dir==="left")next.classList.add("sL");else if(dir==="up")next.classList.add("sU");
  setTimeout(()=>next.classList.remove("sR","sL","sU"),500);
  window.scrollTo(0,0);
  if(id==="menu"){renderMenu();rState="idle";setTimeout(()=>speakText("Hey Emma! Pick a dish and let's cook something delicious!"),400);}
  if(id==="welcome"){rState="idle";setTimeout(()=>speakText("Hey! I'm Riri your cooking coach! Let's cook something delicious!"),700);}
}

function renderMenu(){
  document.getElementById("totalStars").textContent=totalStars;
  document.getElementById("gstars").textContent=totalStars;
  const lv=getLevel();
  document.getElementById("lvlNum").textContent=lv.idx+1;
  document.getElementById("lvlName").textContent=lv.name;
  document.getElementById("menuXP").style.width=Math.min(100,Math.round((totalStars-lv.min)/(lv.xpNext-lv.min)*100))+"%";
  document.getElementById("dgrid").innerHTML=DISHES.map(d=>`
    <div class="dcard ${d.locked?"locked":""}" onclick="${d.locked?"":` burst(event);startDish("${d.id}")`}">
      <div class="dc-bg ${d.cls}"></div><div class="dc-shine"></div><div class="dc-border"></div>
      <div class="dc-orb">${d.emoji}</div>
      <div class="dc-info"><div class="dc-name">${d.name}</div><div class="dc-tag">${d.subject}</div><div class="dc-stars">${[...Array(3)].map((_,i)=>i<d.stars?"⭐":"✦").join("")}</div></div>
      ${d.isNew&&d.stars===0?"<div class='dc-new'>NEW</div>":""}
      ${d.locked?"<div style='position:absolute;top:9px;right:9px;font-size:1.1rem'>🔒</div>":""}
    </div>
  `).join("");
}

async function startDish(id){
  curDish=DISHES.find(d=>d.id===id);curIdx=0;correct=0;challenges=[];
  goTo("game","right");
  document.getElementById("gdish").textContent=curDish.emoji+" "+curDish.name;
  document.getElementById("gstars").textContent=totalStars;
  document.getElementById("progFill").style.width="0%";
  document.getElementById("progLbl").textContent="0 / 3";
  rState="think";
  setCoach("Ooh yes! We're making "+curDish.name+"! Let me get your challenge ready!");
  document.getElementById("loader").classList.remove("hidden");
  try{
    const sysPrompt="You are Riri, a cool fun kind big-sister AI coach for Emma who is 4 years old. Generate 3 fun cooking challenges. Return ONLY valid JSON, no markdown.\nFormat: {\"challenges\":[{\"type\":\"MATHS or SPELLING or COLOURS or COUNTING\",\"ingredient\":\"<emoji>\",\"question\":\"<simple for age 4>\",\"options\":[\"a\",\"b\",\"c\",\"d\"],\"correct\":0,\"coaching_before\":\"<1 fun Riri sentence>\",\"coaching_correct\":\"<1 celebration>\",\"coaching_wrong\":\"<1 kind correction>\"}]}\nRules: very simple for 4yo. Maths=1+1. Spelling=3-letter words. Short sentences.";
    const userMsg="3 cooking challenges for "+curDish.name+" "+curDish.emoji+". Focus: "+curDish.subject+".";
    const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:sysPrompt,messages:[{role:"user",content:userMsg}]})});
    const data=await res.json();challenges=JSON.parse(data.content[0].text.replace(/```json|```/g,"").trim()).challenges;
  }catch(e){challenges=fallback();}
  document.getElementById("loader").classList.add("hidden");rState="idle";showQ(0);
}
function fallback(){return[{type:"MATHS",ingredient:"🥚",question:"We need 2 eggs! We have 1. How many more?",options:["1","3","5","0"],correct:0,coaching_before:"Okay chef Emma, let's count our ingredients!",coaching_correct:"Yes! 1 more egg! Maths superstar!",coaching_wrong:"We need 1 more egg! You've got this!"},{type:"COLOURS",ingredient:"🍓",question:"What colour is a strawberry?",options:["Red","Blue","Yellow","Green"],correct:0,coaching_before:"Look at this yummy ingredient! What colour is it?",coaching_correct:"Red! So smart Emma!",coaching_wrong:"Strawberries are red! Like a fire engine!"},{type:"COUNTING",ingredient:"🫐",question:"Count the blueberries! 🫐🫐🫐",options:["2","3","4","1"],correct:1,coaching_before:"Can you count these blueberries for me?",coaching_correct:"3 blueberries! Amazing counting Emma!",coaching_wrong:"There are 3! One two three!"}];}
function showQ(idx){
  if(idx>=challenges.length){finish();return;}
  const q=challenges[idx];
  const pct=Math.round((idx/challenges.length)*100);
  document.getElementById("progFill").style.width=pct+"%";
  document.getElementById("progLbl").textContent=(idx+1)+" / "+challenges.length;
  document.getElementById("ctype").textContent=q.type+" CHALLENGE";
  document.getElementById("cnum").textContent=(idx+1)+" / "+challenges.length;
  document.getElementById("ingr").textContent=q.ingredient;
  document.getElementById("chalq").textContent=q.question;
  document.getElementById("ogrid").innerHTML=q.options.map((o,i)=>`<button class="opt" onclick="checkAns(${i},${q.correct},'${esc(q.coaching_correct)}','${esc(q.coaching_wrong)}')">${o}</button>`).join("");
  setTimeout(()=>{rState="talk";setCoach(q.coaching_before+" "+q.question);},200);
}
function esc(s){return(s||"").replace(/\\/g,"\\\\").replace(/'/g,"\\'");}
function checkAns(chosen,corr,okMsg,noMsg){
  const btns=document.querySelectorAll(".opt");btns.forEach(b=>b.disabled=true);btns[corr].classList.add("correct");
  if(chosen===corr){correct++;rState="celebrate";setCoach(okMsg);burst({clientX:window.innerWidth/2,clientY:window.innerHeight*0.4});}
  else{btns[chosen].classList.add("wrong");rState="idle";setCoach(noMsg);}
  setTimeout(()=>{curIdx++;rState="idle";showQ(curIdx);},2600);
}
function finish(){
  document.getElementById("progFill").style.width="100%";
  const s=correct===3?3:correct===2?2:1;
  curDish.stars=Math.max(curDish.stars,s);totalStars+=s;curDish.isNew=false;
  document.getElementById("starsRow").innerHTML=[...Array(s)].map((_,i)=>`<span class="star-pop" style="animation-delay:${i*0.35}s">⭐</span>`).join("");
  const msgs=[`You cooked the perfect ${curDish.name}! Riri is SO proud of you!`,`Look at you Emma! A real chef AND a scholar! That's my girl! ✌️`,`${s} stars! You are a total superstar Emma!`];
  const msg=msgs[Math.floor(Math.random()*msgs.length)];
  document.getElementById("celebSub").textContent=msg;
  setTimeout(()=>{goTo("celebration","up");rState="celebrate";setTimeout(()=>{speakText(msg);burst({clientX:window.innerWidth/2,clientY:window.innerHeight*0.3});},700);},500);
}

// ══ RENDER LOOP ══
const heroCV=document.getElementById("heroCanvas");
const panelCV=document.getElementById("panelCanvas");
const celebCV=document.getElementById("celebCanvas");

function setImages(){
  ["chipImg","lvlImg"].forEach(id=>{const el=document.getElementById(id);if(el)el.src="riri_face.png";});
  const bg=document.getElementById("splashBg"); if(bg) bg.src="bg2.png";
  const rr=document.getElementById("splashRiri"); if(rr) rr.src="riri2.png";
  const lg=document.getElementById("splashLogo"); if(lg) lg.src="logo2.png";
}

function loop(){
  rT++;
  // hero canvas — Riri only, transparent bg (kitchen shows through)
  drawRiriOn(heroCV,0.72,false);
  // panel
  const pc=panelCV.getContext("2d");pc.clearRect(0,0,78,110);
  pc.save();pc.translate(39,106);pc.scale(0.32,0.32);
  rShadow(pc);rLegs(pc,Date.now()*0.001);rBody(pc);
  const t2=Date.now()*0.001;
  rArmL(pc,rState==="celebrate"?-0.5+Math.sin(t2*5)*0.4:-0.08+Math.sin(t2)*0.04,rState==="celebrate"&&Math.sin(t2*3)>0.5);
  rArmR(pc,rState==="celebrate"?0.5+Math.sin(t2*5+1)*0.4:0.1,false);rNeck(pc);
  const tl=rState==="think"?0.28:Math.sin(t2*0.8)*0.06;
  pc.save();pc.translate(tl*8,-172+tl*4);pc.rotate(tl);
  rBraidsBack(pc,t2);rFace(pc,rState==="talk"?Math.max(0,Math.sin(t2*9)*0.6+0.3):rState==="celebrate"?0.8:0);rHairTop(pc);rBraidsFront(pc,t2);rClips(pc);
  pc.restore();pc.restore();
  // celeb
  if(document.getElementById("celebration").classList.contains("active")){
    drawRiriOn(celebCV,0.55,false);
  }
  requestAnimationFrame(loop);
}

setImages();renderMenu();loop();


</script>
